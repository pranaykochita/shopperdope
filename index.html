<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #fafafa;
            --border-color: #e6e6e6;
            --text-primary: #333333;
            --text-secondary: #737373;
            --accent: #000000;
            --accent-hover: #333333;
            --error: #e22120;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-primary);
            background-color: var(--bg-main);
            display: flex;
            min-height: 100vh;
        }

        /* Layout */
        .checkout-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-col {
            flex: 1.2;
            padding: 5% 5% 5% 2%;
        }

        .sidebar-col {
            flex: 1;
            background-color: var(--bg-sidebar);
            padding: 5% 2% 5% 5%;
            border-left: 1px solid var(--border-color);
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* Form Elements */
        .section-block {
            margin-bottom: 40px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #fff;
            transition: border 0.2s;
        }

        input[readonly] {
            background-color: #f9f9f9;
            color: var(--text-secondary);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            margin-left: 2px;
        }

        /* Payment Box */
        .payment-box {
            border: 1px solid var(--accent);
            border-radius: 5px;
            padding: 15px;
            background-color: #fafbfc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .payment-box input[type="radio"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
        }

        /* Sidebar Inputs & Summary */
        .product-setup {
            background: #fff;
            padding: 20px;
            border: 1px dashed #ccc;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .product-preview-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            display: none;
        }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            object-fit: contain;
            background: #fff;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Button */
        .btn-pay {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }

        .btn-pay:hover {
            background-color: var(--accent-hover);
        }

        /* Processing State */
        .processing-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Success State */
        .success-content {
            text-align: center;
            display: none;
        }

        .success-content svg {
            width: 60px;
            height: 60px;
            fill: #28a745;
            margin-bottom: 15px;
        }

        @media (max-width: 800px) {
            .checkout-container { flex-direction: column-reverse; }
            .sidebar-col { border-left: none; border-bottom: 1px solid var(--border-color); padding: 5%; }
            .main-col { padding: 5%; }
        }
    </style>
</head>
<body>

    <div class="checkout-container" id="checkout-view">
        
        <div class="main-col">
            <h1 style="font-weight: 500; letter-spacing: -1px; margin-top: 0; margin-bottom: 40px;">Checkout</h1>
            
            <div class="section-block">
                <h2>Shipping address</h2>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Full Name</label>
                    <input type="text" value="Pranay" readonly>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Address</label>
                    <input type="text" value="Sri Yashoda Residency, Karkhana" readonly>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" value="Hyderabad" readonly>
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" value="Telangana" readonly>
                    </div>
                </div>
            </div>

            <div class="section-block">
                <h2>Payment</h2>
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 15px;">All transactions are secure and encrypted.</p>
                <div class="payment-box">
                    <input type="radio" checked id="card-payment">
                    <label for="card-payment" style="margin: 0; font-size: 14px; font-weight: 500; color: var(--text-primary);">
                        Pranay's Credit Card
                    </label>
                    <span style="margin-left: auto; font-size: 14px; color: var(--text-secondary);">•••• 4242</span>
                </div>
            </div>

            <button class="btn-pay" onclick="simulatePayment()">Pay Now</button>
        </div>

        <div class="sidebar-col">
            
            <div class="product-setup">
                <label style="color: #000; font-weight: 500;">Load Item into Cart:</label>
                <input type="text" id="img-url" placeholder="Paste Image Address URL..." style="margin-top: 8px; margin-bottom: 10px;" oninput="updatePreview()">
                <input type="number" id="item-price" placeholder="Enter Exact Price (₹)" oninput="updatePreview()">
            </div>

            <div class="product-preview-container" id="preview-container">
                <img src="" id="preview-img" class="product-img" alt="Product Image">
                <div style="flex: 1;">
                    <div style="font-weight: 500; font-size: 14px; margin-bottom: 5px;">Premium Selection</div>
                    <div style="font-size: 13px; color: var(--text-secondary);">Qty: 1</div>
                </div>
                <div style="font-weight: 500;" id="line-price">₹0</div>
            </div>

            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal-display">₹0</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Free</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span style="font-size: 24px;">
                    <span style="font-size: 14px; color: var(--text-secondary); font-weight: 400; margin-right: 5px;">INR</span> 
                    <span id="total-display">₹0</span>
                </span>
            </div>
        </div>

    </div>

    <div class="processing-overlay" id="overlay">
        <div class="spinner" id="spinner"></div>
        <div id="processing-text" style="font-weight: 500; color: var(--text-primary); margin-top: 10px;">Processing payment...</div>
        
        <div class="success-content" id="success">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            <h2 style="margin: 0 0 10px 0;">Order confirmed</h2>
            <p style="color: var(--text-secondary); font-size: 15px; margin-bottom: 30px;">Your order has been accepted. We'll send shipping updates shortly.</p>
            <p style="font-size: 14px;"><strong>Order number:</strong> <span id="order-num"></span></p>
            <button class="btn-pay" style="width: auto; padding: 12px 30px;" onclick="location.reload()">Continue Shopping</button>
        </div>
    </div>

    <script>
        function updatePreview() {
            const imgUrl = document.getElementById('img-url').value;
            const price = document.getElementById('item-price').value;
            const container = document.getElementById('preview-container');
            
            // Handle Image
            if (imgUrl.length > 5) {
                document.getElementById('preview-img').src = imgUrl;
                container.style.display = 'flex';
            } else {
                container.style.display = 'none';
            }

            // Handle Price Formatting
            if (price) {
                const formattedPrice = '₹' + parseInt(price).toLocaleString('en-IN');
                document.getElementById('line-price').innerText = formattedPrice;
                document.getElementById('subtotal-display').innerText = formattedPrice;
                document.getElementById('total-display').innerText = formattedPrice;
            } else {
                document.getElementById('line-price').innerText = '₹0';
                document.getElementById('subtotal-display').innerText = '₹0';
                document.getElementById('total-display').innerText = '₹0';
            }
        }

        function simulatePayment() {
            const price = document.getElementById('item-price').value;
            if (!price) {
                alert('Please load an item and price first to complete checkout.');
                return;
            }

            const overlay = document.getElementById('overlay');
            const spinner = document.getElementById('spinner');
            const processingText = document.getElementById('processing-text');
            const success = document.getElementById('success');

            // Show processing screen
            overlay.style.display = 'flex';
            spinner.style.display = 'block';
            processingText.style.display = 'block';
            success.style.display = 'none';

            // Simulate server delay
            setTimeout(() => {
                spinner.style.display = 'none';
                processingText.style.display = 'none';
                
                // Generate realistic order number
                const orderPrefix = Math.random() > 0.5 ? 'ORD' : '#';
                document.getElementById('order-num').innerText = orderPrefix + Math.floor(100000000 + Math.random() * 900000000);
                
                // Show success
                success.style.display = 'block';
            }, 2500); // 2.5 seconds feels like a real gateway authorization
        }
    </script>
</body>
</html>
